services:
  metadata_gen:
    build:
      .
    ports:
      - '80:5000'
    env_file:
      - '.env'
    container_name:
      metadata_gen
  logging_suggestion_db:
    image: postgres:14.23
    env_file:
      - '.env'
    volumes:
      - db-data:/var/lib/postgresql/data
    container_name: suggestion_logging
volumes:
  db-data: